apiVersion: apps/v1
kind: Deployment
metadata:
  name: balanceo-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: balanceo-app
  template:
    metadata:
      labels:
        app: balanceo-app
    spec:
      containers:
      - name: balanceo-app
        image: amesitos/balanceo-app:v1
        ports:
        - containerPort: 5000
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: MONGO_URI
          value: "mongodb://mongo:27017/"
---
apiVersion: v1
kind: Service
metadata:
  name: balanceo-app-svc
spec:
  type: LoadBalancer
  selector:
    app: balanceo-app
  ports:
  - port: 8080
    targetPort: 5000
