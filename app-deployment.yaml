apiVersion: apps/v1
kind: Deployment
metadata:
  name: balanceo-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: balanceo-app
  template:
    metadata:
      labels:
        app: balanceo-app
    spec:
      containers:
      - name: balanceo-app
        image: amesitos/balanceo-app:v3
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: MONGO_URI
          value: "mongodb://mongo:27017/"
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: balanceo-app-svc
spec:
  type: LoadBalancer
  selector:
    app: balanceo-app
  ports:
  - port: 8080
    targetPort: 5000
